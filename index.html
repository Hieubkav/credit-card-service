<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #5f6368;
      background: #fff;
    }

    .container {
      max-width: 600px;
      margin: 90px auto 0;
      padding: 0 24px;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 400;
      color: #202124;
    }

    p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.6;
    }

    .code {
      margin-top: 16px;
      font-size: 13px;
      color: #9aa0a6;
    }

    a {
      color: #1a73e8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="container">
    <svg class="icon" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="36" cy="36" r="32" fill="#f1f3f4"/>
      <path d="M24 25h24v17H24z" fill="#dadce0"/>
      <path d="M28 21h16l4 4H24z" fill="#bdc1c6"/>
      <circle cx="30" cy="50" r="2" fill="#9aa0a6"/>
      <circle cx="42" cy="50" r="2" fill="#9aa0a6"/>
    </svg>

    <h1>Không tìm thấy trang</h1>
    <p>Không thể tìm thấy trang bạn đang tìm kiếm.</p>
    <p>Hãy kiểm tra lại địa chỉ URL hoặc quay về <a href="/">trang chủ</a>.</p>
    <div class="code">HTTP ERROR 404</div>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(registrations => registrations.forEach(registration => registration.unregister()));
    }

    if ('caches' in window) {
      caches.keys()
        .then(cacheNames => cacheNames.forEach(cacheName => caches.delete(cacheName)));
    }
  </script>
</body>
</html>
